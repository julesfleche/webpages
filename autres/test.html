<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test — Out of Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px 64px;
      border: 1px solid #222;
      border-radius: 16px;
      background: #0f0f0f;
    }
    .badge {
      display: inline-block;
      background: #5b6af0;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #888;
      font-size: 14px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <span class="badge">GitHub Pages</span>
    <h1>Page de test ✓</h1>
    <p>Le repo <strong>webpages</strong> est opérationnel.</p>
  </div>
</body>
</html>
