// ─── Utils ────────────────────────────────────────────────────
const getWeekStart = (off=0) => {
  const n=new Date(), d=n.getDay(), m=new Date(n);
  m.setDate(n.getDate()+(d===0?-6:1-d)+off*7); m.setHours(0,0,0,0); return m;
};
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const fmtMin = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const parseT = s => { const [h,m]=s.split(':').map(Number); return h*60+(m||0); };
const durLabel = m => { const h=Math.floor(m/60),r=m%60; return !h?`${r}min`:!r?`${h}h`:`${h}h${String(r).padStart(2,'0')}`; };
const snapMin = m => Math.round(m/SNAP)*SNAP;
const dateKey = d => d.toISOString().slice(0,10);
const fmtRange = (s,we) => {
  const e=addDays(s,we?6:4), o={day:'numeric',month:'short'};
  return `${s.toLocaleDateString('fr-FR',o)} — ${e.toLocaleDateString('fr-FR',o)}`;
};

// ─── Time Block ───────────────────────────────────────────────
function Block({ block, client, startHour, onClick, isTeam, member, dark }) {
  const cc = client ? (getCC(client.color)) : CLIENT_COLORS.blue;
  const top = ((block.startMin - startHour*60)/60)*HOUR_H;
  const height = Math.max(((block.endMin-block.startMin)/60)*HOUR_H-2, 16);
  const dur = block.endMin-block.startMin;
  const fg = isTeam ? member.color : cc.text(dark);
  const bg = isTeam ? member.color+'15' : cc.bg(dark);
  const bd = isTeam ? member.color+'44' : cc.bd(dark);

  return (
    <div onClick={e=>{e.stopPropagation(); onClick&&onClick(block);}}
      style={{ position:'absolute', left:3, right:3, top, height, background:bg,
        border:`1px solid ${bd}`, borderLeft:`2.5px solid ${isTeam?member.color:fg}`,
        borderRadius:7, padding:'3px 6px', cursor:isTeam?'default':'pointer',
        zIndex:isTeam?1:2, overflow:'hidden', transition:isTeam?'none':'transform 0.15s,box-shadow 0.15s', userSelect:'none' }}
      onMouseEnter={e=>{if(!isTeam){e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow=`0 4px 14px ${bd}`;}}}
      onMouseLeave={e=>{if(!isTeam){e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}}
    >
      {height>=18 && <div style={{ fontSize:10, fontWeight:600, color:fg, lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
        {isTeam ? `${member.emoji} ${client?.name||'—'}` : (client?.name||'—')}
      </div>}
      {height>=30 && block.taskType && (() => {
        const tm = TASK_META[block.taskType];
        return <div style={{ display:'inline-flex', alignItems:'center', gap:3, marginTop:2, background:`${tm?.color||fg}22`, border:`1px solid ${tm?.color||fg}44`, borderRadius:99, padding:'1px 5px' }}>
          <span style={{ fontSize:9 }}>{tm?.emoji}</span>
          <span style={{ fontSize:9, fontWeight:600, color:tm?.color||fg, letterSpacing:'0.3px' }}>{block.taskType}</span>
        </div>;
      })()}
      {height>=48 && block.note && <div style={{ fontSize:10, color:`${fg}77`, lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:1 }}>{block.note}</div>}
      {height>=46 && !isTeam && <div style={{ fontSize:10, color:`${fg}66`, marginTop:1 }}>{durLabel(dur)}</div>}
    </div>
  );
}

// ─── Calendar ─────────────────────────────────────────────────
function Calendar({ user, blocks, teamBlocks, clients, weekOffset, setWeekOffset, showWeekends, setShowWeekends, startHour, endHour, visibleTeam, dark, teamProp }) {
  // ── Block move/resize drag ──
  useEffect(()=>{
    if(!blockDrag) return;
    const move=(e)=>{
      const st=scrollRef.current?.scrollTop||0;
      const rect=scrollRef.current?.getBoundingClientRect();
      if(!rect) return;
      const y=e.clientY-rect.top+st;
      const rawMin=(y/HOUR_H)*60+startHour*60;
      const snapped=Math.min(Math.max(snapMin(rawMin),startHour*60),endHour*60);
      if(blockDrag.type==='resize'){
        setBlockDrag(p=>({...p,curEndMin:Math.max(snapped,p.origStartMin+SNAP)}));
      } else {
        const dur=blockDrag.origEndMin-blockDrag.origStartMin;
        const dy=y-blockDrag.startY;
        const dMin=(dy/HOUR_H)*60;
        const newStart=Math.min(Math.max(snapMin(blockDrag.origStartMin+dMin),startHour*60),endHour*60-dur);
        // Determine day from X
        const gbRect=scrollRef.current?.getBoundingClientRect();
        if(gbRect){
          const x=e.clientX-gbRect.left-52; // 52px = hour label width
          const colW=(gbRect.width-52)/days.length;
          const di=Math.min(Math.max(Math.floor(x/colW),0),days.length-1);
          setBlockDrag(p=>({...p,curStartMin:newStart,curEndMin:newStart+dur,curDateKey:dateKey(days[di])}));
        } else {
          setBlockDrag(p=>({...p,curStartMin:newStart,curEndMin:newStart+dur}));
        }
      }
    };
    const up=()=>{
      if(blockDrag){
        const orig=blocks.find(b=>b.id===blockDrag.blockId);
        if(orig){
          const updated={...orig,date:blockDrag.curDateKey||blockDrag.origDateKey,startMin:blockDrag.curStartMin,endMin:blockDrag.curEndMin};
          window.dispatchEvent(new CustomEvent('ooo-save',{detail:updated}));
        }
      }
      setBlockDrag(null);
    };
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  },[blockDrag,startHour,endHour,days,blocks]);

  const handleMoveStart=(block,e)=>{
    e.preventDefault();
    const st=scrollRef.current?.scrollTop||0;
    const rect=scrollRef.current?.getBoundingClientRect();
    const y=e.clientY-(rect?.top||0)+st;
    setBlockDrag({type:'move',blockId:block.id,startY:y,origStartMin:block.startMin,origEndMin:block.endMin,origDateKey:block.date,curStartMin:block.startMin,curEndMin:block.endMin,curDateKey:block.date});
  };
  const handleResizeStart=(block,e)=>{
    e.preventDefault();
    setBlockDrag({type:'resize',blockId:block.id,origStartMin:block.startMin,origEndMin:block.endMin,origDateKey:block.date,curStartMin:block.startMin,curEndMin:block.endMin,curDateKey:block.date});
  };


  const T = THEMES[dark?'dark':'light'];
  const [modal, setModal] = useState(null);
  const [drag, setDrag] = useState(null);      // creation drag
  const [blockDrag, setBlockDrag] = useState(null); // move/resize drag
  const scrollRef = useRef(null);
  const gridBodyRef = useRef(null);

  // Listen for chrono stop → open modal
  useEffect(()=>{
    const handler=e=>setModal(e.detail);
    window.addEventListener('ooo-open-modal',handler);
    return()=>window.removeEventListener('ooo-open-modal',handler);
  },[]);
  const weekStart = getWeekStart(weekOffset);
  const days = Array.from({length:showWeekends?7:5},(_,i)=>addDays(weekStart,i));
  const hours = Array.from({length:endHour-startHour},(_,i)=>startHour+i);
  const teammates = TEAM.filter(m=>m.id!==user.id);

  useEffect(()=>{
    if(!drag) return;
    const move = e => {
      const st=scrollRef.current?.scrollTop||0, rect=scrollRef.current?.getBoundingClientRect();
      if(!rect) return;
      const y=e.clientY-rect.top+st, raw=(y/HOUR_H)*60+startHour*60;
      const snapped=Math.min(Math.max(snapMin(raw),startHour*60),endHour*60);
      setDrag(p=>({...p,endMin:Math.max(snapped,p.startMin+SNAP)}));
    };
    const up = () => {
      if(drag&&drag.endMin-drag.startMin>=SNAP) setModal({date:drag.dateKey,startMin:drag.startMin,endMin:drag.endMin,clientId:'',description:''});
      setDrag(null);
    };
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    return ()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
  },[drag,startHour,endHour]);

  const onMouseDown = (date,e) => {
    if(e.button!==0) return; e.preventDefault();
    const st=scrollRef.current?.scrollTop||0, rect=scrollRef.current?.getBoundingClientRect();

// ── Timezone Search ──────────────────────────────────────────
function TzSearch({ current, onSelect, onClose }) {
  const [q, setQ] = React.useState('');
  const allTz = React.useMemo(()=>{
    try { return Intl.supportedValuesOf('timeZone'); }
    catch { return Object.values(CITY_PRESETS).map(c=>c.tz); }
  },[]);
  const filtered = q.length<2 ? [] : allTz.filter(tz=>tz.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  return (
    <div style={{ position:'relative', zIndex:20 }}>
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onBlur={e=>{if(!e.currentTarget.contains(e.relatedTarget)) onClose();}}
        placeholder="Rechercher une ville…"
        style={{ fontSize:11,background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',borderRadius:7,padding:'4px 8px',fontFamily:'DM Sans,sans-serif',outline:'none',width:'100%' }} />
      {filtered.length>0&&(
        <div style={{ position:'absolute',top:'100%',left:0,right:0,background:'#111',border:'1px solid rgba(255,255,255,0.15)',borderRadius:8,overflow:'hidden',zIndex:100,maxHeight:160,overflowY:'auto',marginTop:2 }}>
          {filtered.map(tz=>(
            <div key={tz} onMouseDown={()=>onSelect(tz)} style={{ padding:'6px 10px',fontSize:11,color:tz===current?'#a5b4fc':'#ccc',cursor:'pointer',background:tz===current?'rgba(79,114,245,0.15)':'transparent' }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.08)'}
              onMouseLeave={e=>e.currentTarget.style.background=tz===current?'rgba(79,114,245,0.15)':'transparent'}>
              {tz.replace(/_/g,' ')}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── GlobePanel: uses globe.gl for WebGL 3D Earth ─────────────
function GlobePanel({ members, locations, onLocationChange, dark }) {
  const containerRef = React.useRef(null);
  const globeRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const [times, setTimes] = React.useState({});
  const [editing, setEditing] = React.useState(null);
  const [ready, setReady] = React.useState(false);

  const getMemberLoc = (m) => locations[m.id] || { lat:m.lat, lng:m.lng, tz:m.tz };
  const getPoints = () => members.map(m => { const l=getMemberLoc(m); return { lat:l.lat, lng:l.lng, id:m.id, emoji:m.emoji, color:m.color, name:m.name }; });

  React.useEffect(() => {
    const tick = () => {
      const t={};
      members.forEach(m => {
        const loc=getMemberLoc(m);
        try { t[m.id]=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:loc.tz}); }
        catch { t[m.id]='--:--'; }
      });
      setTimes(t);
    };
    tick(); const id=setInterval(tick,1000); return ()=>clearInterval(id);
  },[locations]);

  React.useEffect(() => {
    if (!containerRef.current || !window.GlobeLib) return;
    const G = window.GlobeLib;

    // Use real Earth texture
    const globeTexUrl='https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
    const globe = G()(containerRef.current)
      .width(containerRef.current.offsetWidth||500)
      .height(420)
      .globeImageUrl(globeTexUrl)
      .atmosphereColor('rgba(100,160,255,0.85)')
      .atmosphereAltitude(0.22)
      .backgroundColor('rgba(0,0,0,0)');

    // Auto-rotate via controls
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.6;
    globe.controls().enableZoom = false;

    // Member emoji pins
    globe
      .htmlElementsData(getPoints())
      .htmlElement(d => {
        const el=document.createElement('div');
        el.style.cssText='font-size:28px;cursor:default;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.7));transform:translateY(-14px);';
        el.title=d.name;
        el.textContent=d.emoji;
        return el;
      })
      .htmlAltitude(0.01);
    globeRef.current = globe;
    setReady(true);
    return () => { /* globe.gl handles its own teardown */ };
  },[dark]);

  // Update points when locations change
  React.useEffect(() => {
    if (globeRef.current) {
      globeRef.current.htmlElementsData(getPoints());
    }
  },[locations]);

  const T=THEMES[dark?'dark':'light'];
  return (
    <div>
      <div ref={containerRef} dangerouslySetInnerHTML={{__html:''}} style={{ width:'100%', height:420, borderRadius:16, overflow:'hidden', background:'radial-gradient(ellipse at 50% 50%,#0a1628,#030810)' }} />
      {/* Member cards */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:14 }}>
        {members.map(m=>{
          const loc=getMemberLoc(m);
          const cityName=Object.entries(CITY_PRESETS).find(([,v])=>v.tz===loc.tz)?.[0]||loc.tz.split('/').pop().replace('_',' ');
          return (
            <div key={m.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:`linear-gradient(135deg,${m.color}15,${m.color}08)`, border:`1px solid ${m.color}30`, borderRadius:12 }}>
              <span style={{ fontSize:24, lineHeight:1 }}>{m.emoji}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:600, color:'#fff', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', textShadow:'0 1px 4px rgba(0,0,0,0.5)' }}>{m.name}</div>
                {editing===m.id?(
                  <TzSearch current={loc.tz} onSelect={tz=>{onLocationChange(m.id,{tz,lat:loc.lat,lng:loc.lng});setEditing(null);}} onClose={()=>setEditing(null)} />
                ):(
                  <button onClick={()=>setEditing(m.id)} style={{ fontSize:11,color:'rgba(255,255,255,0.75)',background:'none',border:'none',cursor:'pointer',fontFamily:'DM Sans,sans-serif',padding:0 }}>
                    {cityName} ✎
                  </button>
                )}
              </div>
              <div style={{ fontFamily:'Poppins,sans-serif',fontWeight:700,fontSize:18,color:T.text,letterSpacing:'-0.5px',flexShrink:0 }}>{times[m.id]||'--:--'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── DonutChart ─────────────────────────────────────────────────
function DonutChart({ segments, size=140, thick=24 }) {
  const total=segments.reduce((s,d)=>s+d.value,0)||1;
  const r=(size-thick)/2, circ=2*Math.PI*r;
  let cum=0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:'rotate(-90deg)', flexShrink:0 }}>
      {segments.map((seg,i)=>{
        const arc=(seg.value/total)*circ;
        const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none"
          stroke={seg.color} strokeWidth={thick} strokeLinecap="butt"
          strokeDasharray={`${Math.max(arc-1.5,0)} ${circ}`} strokeDashoffset={-cum} />;
        cum+=arc;
        return el;
      })}
    </svg>
  );
}

// ── Radar chart (task type balance) ───────────────────────────
function RadarChart({ data, size=160, dark, memberColor='#4f72f5' }) {
  const T=THEMES[dark?'dark':'light'];
  const N=data.length;
  if(!N) return null;
  const cx=size/2, cy=size/2, r=size/2-24;
  const maxVal=Math.max(...data.map(d=>d.value),1);
  const angle=(i)=>(i/N)*2*Math.PI-Math.PI/2;
  const pt=(i,radius)=>({x:cx+radius*Math.cos(angle(i)),y:cy+radius*Math.sin(angle(i))});
  const gridLevels=[0.25,0.5,0.75,1];
  const polyPts=data.map((d,i)=>pt(i,(d.value/maxVal)*r));
  const polyStr=polyPts.map(p=>`${p.x},${p.y}`).join(' ');
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* Grid */}
      {gridLevels.map((lvl,li)=>(
        <polygon key={li} points={data.map((_,i)=>{ const p=pt(i,r*lvl); return `${p.x},${p.y}`; }).join(' ')}
          fill="none" stroke={dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'} strokeWidth={1} />
      ))}
      {/* Axes */}
      {data.map((_,i)=>{ const p=pt(i,r); return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)'} strokeWidth={1}/> })}
      {/* Data */}
      <polygon points={polyStr} fill={`${memberColor}30`} stroke={memberColor} strokeWidth={2} strokeLinejoin="round"/>
      {polyPts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill={memberColor}/>)}
      {/* Labels */}
      {data.map((d,i)=>{ const p=pt(i,r+14); return <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={T.textMuted} fontFamily="DM Sans,sans-serif">{d.label}</text> })}
    </svg>
  );
}

// ─── Dashboard ────────────────────────────────────────────────
function Dashboard({ blocks, teamBlocks, clients, dark, rates, onRateChange, locations, onLocationChange }) {
  const T = THEMES[dark?'dark':'light'];
  const allBlocks = [...blocks, ...teamBlocks];
  const [weekOff, setWeekOff] = React.useState(0);

  const weekStart = getWeekStart(weekOff);
  const weekDays = Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const weekDayKeys = weekDays.map(dateKey);
  const weekAll = allBlocks.filter(b=>weekDayKeys.includes(b.date));
  const totalTeam = weekAll.reduce((s,b)=>s+b.endMin-b.startMin,0);
  const today = new Date();
  const isCurrentWeek = weekOff === 0;

  // Client data
  const clientData = clients.map(c=>{
    const min=weekAll.filter(b=>b.clientId===c.id).reduce((s,b)=>s+b.endMin-b.startMin,0);
    const cc=getCC(c.color);
    return { ...c, min, cc };
  }).filter(c=>c.min>0).sort((a,b)=>b.min-a.min);
  const totalClientMin = clientData.reduce((s,c)=>s+c.min,0)||1;

  // Monthly data
  let mws=getWeekStart(0);
  const mStart=new Date(today.getFullYear(),today.getMonth(),1);
  while(addDays(mws,-7)>=mStart) mws=addDays(mws,-7);
  const monthWeeks=[];
  for(let i=0;i<6;i++){
    const keys=Array.from({length:7},(_,j)=>dateKey(addDays(mws,j)));
    if(new Date(mws)<=today) monthWeeks.push({start:new Date(mws),keys});
    mws=addDays(mws,7); if(new Date(mws)>today) break;
  }
  const curWeekIdx = monthWeeks.findIndex(w=>dateKey(w.start)===dateKey(getWeekStart(0)));
  const maxMonthMin=Math.max(...TEAM.flatMap(m=>monthWeeks.map(w=>allBlocks.filter(b=>b.userId===m.id&&w.keys.includes(b.date)).reduce((s,b)=>s+b.endMin-b.startMin,0))),60);

  // Radar data per person
  const personRadar = TEAM.map(m=>({
    member:m,
    data:TASK_TYPES.map(t=>({ label:TASK_META[t]?.emoji||t.slice(0,3), value:weekAll.filter(b=>b.userId===m.id&&b.taskType===t).reduce((s,b)=>s+b.endMin-b.startMin,0) }))
  }));

  // Daily hours per person
  const velocityData = TEAM.map(m=>({
    member:m,
    pts: weekDays.map(d=>allBlocks.filter(b=>b.userId===m.id&&b.date===dateKey(d)).reduce((s,b)=>s+b.endMin-b.startMin,0))
  }));
  const maxVelocity=Math.max(...velocityData.flatMap(v=>v.pts),60);

  const maxHourActivity=Math.max(...Array.from({length:24},(_,h)=>
    weekAll.filter(b=>b.startMin<(h+1)*60&&b.endMin>h*60).reduce((s,b)=>s+Math.min(b.endMin,(h+1)*60)-Math.max(b.startMin,h*60),0)
  ),1);

  const card=(grad)=>({ background:grad, borderRadius:20, padding:'24px 28px', border:`1px solid ${T.border}`, position:'relative', overflow:'hidden' });
  const dg=dark;

  return (
    <div style={{ flex:1, overflowY:'auto', padding:'24px 28px', background:T.bg }}>

      {/* ── Week nav ── */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:4 }}>
            {isCurrentWeek?'Cette semaine':`Semaine du ${weekStart.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`}
          </div>
          <div style={{ fontFamily:'Poppins,sans-serif',fontWeight:700,fontSize:26,color:T.text,letterSpacing:'-1px' }}>{durLabel(totalTeam)}</div>
        </div>
        <button onClick={()=>setWeekOff(w=>w-1)} style={{ background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 14px',color:T.textMuted,cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13 }}>‹ Préc.</button>
        {weekOff!==0&&<button onClick={()=>setWeekOff(0)} style={{ background:'#4f72f5',border:'none',borderRadius:10,padding:'8px 14px',color:'#fff',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:600 }}>Auj.</button>}
        {weekOff<0&&<button onClick={()=>setWeekOff(w=>Math.min(w+1,0))} style={{ background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 14px',color:T.textMuted,cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13 }}>Suiv. ›</button>}
      </div>

      {/* ── Row 1: Globe + Monthly ── */}
      <div style={{ display:'grid', gridTemplateColumns:'3fr 2fr', gap:20, marginBottom:20 }}>

        {/* Globe */}
        <div style={card(dg?'linear-gradient(145deg,#060d1f,#0f1b3d)':'linear-gradient(145deg,#080f2a,#0a1433)')}>
          <div style={{ fontSize:11,color:'rgba(165,180,252,0.7)',textTransform:'uppercase',letterSpacing:'2px',marginBottom:16 }}>Équipe — Live</div>
          <GlobePanel members={TEAM} dark={dark} locations={locations} onLocationChange={onLocationChange} />
        </div>

        {/* Monthly - centred on current week */}
        <div style={card(dg?'linear-gradient(145deg,#0d1117,#12161e)':'linear-gradient(145deg,#fff,#f5f8ff)')}>
          <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:18 }}>
            {today.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}
          </div>
          <div style={{ display:'flex',flexDirection:'column',gap:18 }}>
            {TEAM.map(m=>{
              const wMins=monthWeeks.map(w=>allBlocks.filter(b=>b.userId===m.id&&w.keys.includes(b.date)).reduce((s,b)=>s+b.endMin-b.startMin,0));
              const total=wMins.reduce((s,x)=>s+x,0);
              return (
                <div key={m.id}>
                  <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:7 }}>
                    <span style={{ fontSize:18 }}>{m.emoji}</span>
                    <span style={{ fontSize:13,fontWeight:600,color:T.text,flex:1 }}>{m.name}</span>
                    <span style={{ fontFamily:'Poppins,sans-serif',fontWeight:700,fontSize:15,color:T.text }}>{durLabel(total)}</span>
                  </div>
                  <div style={{ display:'flex',gap:3 }}>
                    {monthWeeks.map((w,i)=>{
                      const wMin=wMins[i],pct=maxMonthMin>0?(wMin/maxMonthMin)*100:0;
                      const isCur=i===curWeekIdx;
                      return (
                        <div key={i} style={{ flex:isCur?2:1, transition:'flex 0.3s' }}>
                          <div style={{ height:isCur?10:6,background:dg?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)',borderRadius:99,overflow:'hidden',marginBottom:3,transition:'height 0.3s' }}>
                            <div style={{ height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${m.color},${m.color}99)`,borderRadius:99 }} />
                          </div>
                          <div style={{ fontSize:isCur?10:8,color:isCur?T.text:T.textFaint,fontWeight:isCur?700:400,textAlign:'center' }}>
                            {isCur?'●':(`S${i+1}`)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* ── Row 2: Client distribution full width ── */}
      <div style={{ ...card(dg?'linear-gradient(145deg,#0d1117,#161b22)':'linear-gradient(145deg,#fff,#f8faff)'), marginBottom:20 }}>
        <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:14 }}>Répartition clients</div>
        {/* Stacked proportion bar */}
        <div style={{ display:'flex',height:12,borderRadius:99,overflow:'hidden',marginBottom:18,gap:2 }}>
          {clientData.map((c,i)=>(
            <div key={c.id} title={`${c.name}: ${durLabel(c.min)}`}
              style={{ width:`${(c.min/totalClientMin)*100}%`, background:c.cc.fg, minWidth:6,
                borderRadius:i===0?'99px 0 0 99px':i===clientData.length-1?'0 99px 99px 0':'0' }} />
          ))}
        </div>
        {/* Per-client bars */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:12 }}>
          {clientData.map(c=>{
            const pct=Math.round((c.min/totalClientMin)*100);
            const contributors=TEAM.filter(m=>weekAll.some(b=>b.userId===m.id&&b.clientId===c.id));
            return (
              <div key={c.id} style={{ padding:'12px 14px',background:c.cc.bg(dark),border:`1px solid ${c.cc.bd(dark)}`,borderRadius:14 }}>
                <div style={{ display:'flex',alignItems:'center',gap:7,marginBottom:8 }}>
                  <div style={{ width:9,height:9,borderRadius:'50%',background:c.cc.fg }} />
                  <span style={{ fontSize:13,fontWeight:600,color:c.cc.text(dark),flex:1 }}>{c.name}</span>
                  <span style={{ fontSize:12,fontWeight:700,color:c.cc.text(dark) }}>{durLabel(c.min)}</span>
                </div>
                <div style={{ height:5,background:dg?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)',borderRadius:99,overflow:'hidden',marginBottom:6 }}>
                  <div style={{ height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${c.cc.fg},${c.cc.fg}aa)`,borderRadius:99 }} />
                </div>
                <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
                  <div style={{ display:'flex',gap:3 }}>{contributors.map(m=><span key={m.id} style={{ fontSize:14 }}>{m.emoji}</span>)}</div>
                  <span style={{ fontSize:11,color:c.cc.text(dark),opacity:0.7 }}>{pct}%</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Row 3: Heatmap + Velocity + Day pattern ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:20, marginBottom:20 }}>

        {/* Heatmap */}
        <div style={card(dg?'linear-gradient(145deg,#0d1117,#12161e)':'linear-gradient(145deg,#fff,#f5f8ff)')}>
          <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:14 }}>Heatmap</div>
          <TeamHeatmap allBlocks={allBlocks} weekDays={weekDays} dark={dark} />
        </div>

        {/* Velocity: cumulative hours per day */}
        <div style={card(dg?'linear-gradient(145deg,#0d1117,#12161e)':'linear-gradient(145deg,#fff,#f5f8ff)')}>
          <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:14 }}>Heures / jour / personne</div>
          <svg width="100%" height={134} viewBox="0 0 300 134" preserveAspectRatio="none" style={{ overflow:'visible' }}>
            {/* Y-axis grid + labels */}
            {[0,0.25,0.5,0.75,1].map((lvl,i)=>{
              const y=10+(1-lvl)*100;
              const label=lvl===0?'0':durLabel(Math.round(maxVelocity*lvl));
              return (
                <g key={i}>
                  <line x1={36} y1={y} x2={295} y2={y} stroke={T.textFaint} strokeWidth={0.5} strokeOpacity={0.25} strokeDasharray={i===0?'none':'3,3'} />
                  <text x={34} y={y+3} textAnchor="end" fontSize={8} fill={T.textFaint} fontFamily="DM Sans,sans-serif">{label}</text>
                </g>
              );
            })}
            {velocityData.map(({member,pts})=>{
              const px=(i)=>(i/6)*255+40;
              const py=(v)=>10+(1-v/maxVelocity)*100;
              const pathD=pts.map((v,i)=>`${i===0?'M':'L'}${px(i)},${py(v)}`).join(' ');
              const areaD=pathD+` L${px(6)},110 L${px(0)},110 Z`;
              return (
                <g key={member.id}>
                  <path d={areaD} fill={`${member.color}15`} />
                  <path d={pathD} fill="none" stroke={member.color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
                  {pts.map((v,i)=>v>0&&<circle key={i} cx={px(i)} cy={py(v)} r={3} fill={member.color}/>)}
                </g>
              );
            })}
            {/* Day labels */}
            {['L','M','M','J','V','S','D'].map((l,i)=>(
              <text key={i} x={(i/6)*255+40} y={122} textAnchor="middle" fontSize={9} fill={T.textFaint} fontFamily="DM Sans,sans-serif">{l}</text>
            ))}
            {/* Axis line */}
            <line x1={36} y1={10} x2={36} y2={110} stroke={T.textFaint} strokeWidth={0.5} strokeOpacity={0.4} />
          </svg>
          <div style={{ display:'flex',flexWrap:'wrap',gap:6,marginTop:6 }}>
            {TEAM.map(m=><span key={m.id} style={{ fontSize:10,color:m.color,fontWeight:600,display:'flex',alignItems:'center',gap:4 }}><span style={{ width:12,height:2,background:m.color,display:'inline-block',borderRadius:99 }}/>{m.name.split(' ')[0]}</span>)}
          </div>
        </div>

        {/* Day pattern */}
        <div style={card(dg?'linear-gradient(145deg,#0d1117,#12161e)':'linear-gradient(145deg,#fff,#f5f8ff)')}>
          <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:14 }}>Activité par heure</div>
          <div style={{ display:'flex',alignItems:'flex-end',gap:2,height:80 }}>
            {Array.from({length:24},(_,h)=>{
              // Segments per person for this hour
              const segs=TEAM.map(m=>({
                color:m.color,
                min:weekAll.filter(b=>b.userId===m.id&&b.startMin<(h+1)*60&&b.endMin>h*60).reduce((s,b)=>s+Math.min(b.endMin,(h+1)*60)-Math.max(b.startMin,h*60),0)
              })).filter(s=>s.min>0);
              const totalMin=segs.reduce((s,seg)=>s+seg.min,0);
              const pct=totalMin/(maxHourActivity*60)||0;
              const barH=Math.max(pct*100,segs.length>0?3:0);
              return (
                <div key={h} title={`${h}h`} style={{ flex:1, height:`${barH}%`, display:'flex',flexDirection:'column-reverse',borderRadius:3,overflow:'hidden' }}>
                  {segs.map((seg,si)=>(
                    <div key={si} style={{ flex:seg.min, background:seg.color, opacity:0.8 }} />
                  ))}
                </div>
              );
            })}
          </div>
          <div style={{ display:'flex',justifyContent:'space-between',marginTop:5 }}>
            <span style={{ fontSize:9,color:T.textFaint }}>0h</span>
            <span style={{ fontSize:9,color:T.textFaint }}>12h</span>
            <span style={{ fontSize:9,color:T.textFaint }}>23h</span>
          </div>
          <div style={{ display:'flex',gap:6,marginTop:8,flexWrap:'wrap' }}>
            {TEAM.map(m=><span key={m.id} style={{ fontSize:10,color:m.color,display:'flex',alignItems:'center',gap:4,fontWeight:600 }}><span style={{ width:8,height:8,borderRadius:2,background:m.color,display:'inline-block' }}/>{m.name.split(' ')[0]}</span>)}
          </div>
        </div>
      </div>

      {/* ── Row 4: Radars ── */}
      <div style={{ ...card(dg?'linear-gradient(145deg,#0d1117,#12161e)':'linear-gradient(145deg,#fff,#f5f8ff)') }}>
        <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'2px',marginBottom:20 }}>Types de tâches / personne</div>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20 }}>
          {personRadar.map(({member,data})=>{
            const hasData=data.some(d=>d.value>0);
            return (
              <div key={member.id} style={{ display:'flex',flexDirection:'column',alignItems:'center' }}>
                <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:10,alignSelf:'flex-start' }}>
                  <span style={{ fontSize:22 }}>{member.emoji}</span>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600,color:T.text }}>{member.name}</div>
                    <div style={{ fontSize:11,color:T.textFaint }}>{durLabel(data.reduce((s,d)=>s+d.value,0))}</div>
                  </div>
                </div>
                {hasData
                  ? <RadarChart data={data} size={150} dark={dark} memberColor={member.color} />
                  : <div style={{ height:150,display:'flex',alignItems:'center',justifyContent:'center',color:T.textFaint,fontSize:12 }}>Aucune tâche</div>
                }
                <div style={{ display:'flex',flexWrap:'wrap',gap:4,marginTop:8,justifyContent:'center' }}>
                  {data.filter(d=>d.value>0).map((d,i)=>{
                    const t=TASK_TYPES[i]; const meta=TASK_META[t];
                    return <span key={t} style={{ fontSize:10,background:`${meta?.color}18`,borderRadius:99,padding:'2px 7px',color:meta?.color,fontWeight:600 }}>{meta?.emoji} {durLabel(d.value)}</span>;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Entry Modal ──────────────────────────────────────────────
function EntryModal({ data, clients, onSave, onDelete, onClose, dark }) {
  const T=THEMES[dark?'dark':'light'];
  const isNew=!data.id;
  const [clientId,setClientId]=useState(data.clientId||'');
  const [taskType,setTaskType]=useState(data.taskType||'');
  const [note,setNote]=useState(data.note||'');
  const [startT,setStartT]=useState(fmtMin(data.startMin));
  const [endT,setEndT]=useState(fmtMin(data.endMin));
  const dur=parseT(endT)-parseT(startT);

  const save=()=>{const s=parseT(startT),e=parseT(endT);if(e<=s)return;onSave({...data,clientId,taskType,note,startMin:s,endMin:e});};

  return (
    <div style={{ position:'fixed',inset:0,background:T.modalOverlay,backdropFilter:'blur(6px)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease' }} onClick={onClose}>
      <div style={{ background:T.modalBg,border:`1px solid ${T.border}`,borderRadius:20,padding:'28px',width:440,maxWidth:'95vw',boxShadow:'0 8px 40px rgba(0,0,0,0.15)',animation:'slideUp 0.2s ease' }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16 }}>
          <span style={{ fontFamily:'Poppins,sans-serif',fontWeight:600,fontSize:16,color:T.text }}>{isNew?'Nouvelle entrée':'Modifier'}</span>
          <button onClick={onClose} style={{ background:'none',border:'none',color:T.textFaint,cursor:'pointer',fontSize:18 }}>✕</button>
        </div>
        <div style={{ fontSize:13,color:T.textMuted,marginBottom:16 }}>{new Date(data.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
        {/* Time */}
        <div style={{ display:'flex',gap:8,marginBottom:16,alignItems:'flex-end' }}>
          {[['Début',startT,setStartT],['Fin',endT,setEndT]].map(([label,val,set],i)=>(
            <React.Fragment key={i}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:11,color:T.textMuted,marginBottom:4 }}>{label}</div>
                <input type="time" value={val} onChange={e=>set(e.target.value)} style={{ background:T.inputBg,border:`1px solid ${T.inputBorder}`,color:T.inputColor,borderRadius:10,padding:'10px 12px',fontSize:14,fontFamily:'DM Sans,sans-serif',outline:'none',width:'100%' }} />
              </div>
              {i===0&&<div style={{ color:T.textFaint,paddingBottom:10 }}>→</div>}
            </React.Fragment>
          ))}
          <div style={{ paddingBottom:10,fontSize:13,color:'#5b6af0',fontWeight:700,minWidth:36,textAlign:'right' }}>{dur>0?durLabel(dur):''}</div>
        </div>
        {/* Clients */}
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:11,color:T.textMuted,marginBottom:8 }}>Client</div>
          <div style={{ display:'flex',flexWrap:'wrap',gap:6 }}>
            {clients.map(c=>{
              const cc=getCC(c.color), sel=clientId===c.id;
              return <button key={c.id} onClick={()=>setClientId(c.id)} style={{ background:sel?cc.bg(dark):T.pillBg,border:`1px solid ${sel?cc.bd(dark):'transparent'}`,color:sel?cc.text(dark):T.textMuted,borderRadius:999,padding:'6px 14px',fontSize:13,cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:sel?600:400,transition:'all 0.15s' }}>{c.name}</button>;
            })}
          </div>
        </div>
        {/* Task type */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11,color:T.textMuted,marginBottom:8 }}>Type de tâche</div>
          <div style={{ display:'flex',flexWrap:'wrap',gap:6 }}>
            {TASK_TYPES.map(t=>{
              const sel=taskType===t;
              return <button key={t} onClick={()=>setTaskType(sel?'':t)} style={{ background:sel?'rgba(91,106,240,0.12)':'transparent',border:`1px solid ${sel?'rgba(91,106,240,0.4)':T.border}`,color:sel?'#5b6af0':T.textMuted,borderRadius:999,padding:'6px 14px',fontSize:13,cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:sel?600:400,transition:'all 0.15s' }}>{t}</button>;
            })}
          </div>
        </div>
        {/* Note */}
        <div style={{ marginBottom:22 }}>
          <div style={{ fontSize:11,color:T.textMuted,marginBottom:4 }}>Note (optionnel)</div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Détails supplémentaires…" onKeyDown={e=>e.key==='Enter'&&save()} style={{ background:T.inputBg,border:`1px solid ${T.inputBorder}`,color:T.inputColor,borderRadius:10,padding:'10px 14px',fontSize:14,fontFamily:'DM Sans,sans-serif',outline:'none',width:'100%' }} />
        </div>
        <div style={{ display:'flex',justifyContent:'space-between' }}>
          {!isNew?<button onClick={()=>onDelete(data.id)} style={{ background:'none',border:`1px solid rgba(225,29,72,0.25)`,color:'#e11d48',borderRadius:999,padding:'9px 16px',fontSize:14,cursor:'pointer',fontFamily:'DM Sans,sans-serif' }}>Supprimer</button>:<div/>}
          <div style={{ display:'flex',gap:8 }}>
            <button onClick={onClose} style={{ background:T.btnGhostBg,border:`1px solid ${T.btnGhostBorder}`,color:T.btnGhostColor,borderRadius:999,padding:'9px 16px',fontSize:14,cursor:'pointer',fontFamily:'DM Sans,sans-serif' }}>Annuler</button>
            <button onClick={save} disabled={!clientId} style={{ background:'#5b6af0',color:'#fff',border:'none',borderRadius:999,padding:'9px 18px',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif',opacity:clientId?1:0.4 }}>Enregistrer →</button>

          </div>
        </div>
      </div>
    </div>
  );
}

// ── Admin Panel (Jules only) ──────────────────────────────────
const EMOJI_LIST = ['🧑\u200d🎨','👩\u200d💻','🧑\u200d🚀','👩\u200d🎤','🧑\u200d💼','👩\u200d🏫','🧑\u200d🔬','👩\u200d🎤','🧑\u200d🍳','👩\u200d💻','🧑\u200d🎭','👨\u200d💼','👩\u200d🎨','🧑\u200d🔧'];
const COLOR_LIST = ['#5b6af0','#a78bfa','#f472b6','#34d399','#f59e0b','#06b6d4','#f43f5e','#10b981','#8b5cf6','#fb923c'];

function AdminPanel({ team, onSave, onClose, dark }) {
  const T=THEMES[dark?'dark':'light'];
  const [members, setMembers] = React.useState(team.map(m=>({...m})));
  const [newMember, setNewMember] = React.useState({ name:'', initials:'', emoji:'🧑\u200d💼', color:'#5b6af0', tz:'Europe/Paris', lat:48.85, lng:2.35, pwd:'' });

  const update=(id,field,val)=>setMembers(prev=>prev.map(m=>m.id===id?{...m,[field]:val}:m));
  const remove=(id)=>setMembers(prev=>prev.filter(m=>m.id!==id));
  const addMember=()=>{
    if(!newMember.name.trim()||!newMember.pwd.trim()) return;
    const initials=newMember.name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    setMembers(prev=>[...prev,{...newMember,id:'u'+Date.now(),initials}]);

        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>

// ─── Sidebar ──────────────────────────────────────────────────
function Sidebar({ user, blocks, teamBlocks, clients, weekStart, showWeekends, dark, onDarkToggle, onLogout, onAddClient, visibleTeam, onToggleTeam, onSync, syncing, lastSync, view, setView, chrono, onChronoStart, onChronoStop, fmtChrono, onAdminOpen, team }) {
  const T=THEMES[dark?'dark':'light'];
  const days=Array.from({length:showWeekends?7:5},(_,i)=>dateKey(addDays(weekStart,i)));
  const myBlocks=blocks.filter(b=>days.includes(b.date)&&b.userId===user.id);
  const totalMin=myBlocks.reduce((s,b)=>s+b.endMin-b.startMin,0);

    <div style={{ width:236,flexShrink:0,background:T.sidebar,borderRight:`1px solid ${T.border}`,display:'flex',flexDirection:'column',padding:'18px 16px',overflow:'hidden' }}>

        </span>

          {dark?'☀️':'🌙'}
        </button>
      </div>

      {/* View tabs */}
      <div style={{ display:'flex',gap:4,marginBottom:20,background:T.statCardBg,borderRadius:12,padding:4 }}>

        <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:6 }}>Ma semaine</div>
        <div style={{ fontFamily:'Poppins,sans-serif',fontWeight:700,fontSize:28,color:T.text,letterSpacing:'-1px' }}>{durLabel(totalMin)}</div>
        <div style={{ fontSize:12,color:T.textFaint,marginTop:2 }}>{myBlocks.length} entrée{myBlocks.length!==1?'s':''}</div>
      </div>

      {/* Chrono */}
      <div style={{ marginBottom:18, background:chrono.running?'rgba(244,63,94,0.08)':'#111', border:`1px solid ${chrono.running?'rgba(244,63,94,0.3)':'rgba(255,255,255,0.07)'}`, borderRadius:14, padding:'14px 16px', transition:'all 0.3s', position:'relative', overflow:'hidden' }}>
        {!chrono.running && <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg,rgba(91,106,240,0.08),rgba(167,139,250,0.06),rgba(244,114,182,0.04))', pointerEvents:'none' }} />}
        <div style={{ fontSize:10, color:chrono.running?'#f43f5e':'rgba(255,255,255,0.4)', textTransform:'uppercase', letterSpacing:'1.5px', marginBottom:8, display:'flex', alignItems:'center', gap:5 }}>
          {chrono.running && <span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#f43f5e', animation:'pulse 1s infinite' }} />}

        </div>
        <div style={{ fontFamily:'Poppins,sans-serif', fontWeight:700, fontSize:28, letterSpacing:'-0.5px', marginBottom:12, transition:'all 0.3s',

          background: chrono.running ? 'none' : 'linear-gradient(135deg,#6b7fff,#a78bfa,#f472b6)',

        </div>
        <button onClick={chrono.running?onChronoStop:onChronoStart} style={{ width:'100%', border:'none', borderRadius:10, padding:'9px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'DM Sans,sans-serif', transition:'all 0.2s', color:'#fff',
          background: chrono.running ? '#f43f5e' : 'linear-gradient(135deg,#6b7fff,#a78bfa,#f472b6)',

        }}>
          {chrono.running?'⏹ Stop & enregistrer':'▶ Démarrer'}
        </button>
      </div>

      {/* Clients */}
      <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:10 }}>Clients</div>
      <div style={{ flex:1,overflowY:'auto',marginBottom:6 }}>
        {clients.map(c=>{
          const cc=getCC(c.color);
          const min=myBlocks.filter(b=>b.clientId===c.id).reduce((s,b)=>s+b.endMin-b.startMin,0);
          const pct=totalMin>0?(min/totalMin)*100:0;
          return (
            <div key={c.id} style={{ marginBottom:10 }}>
              <div style={{ display:'flex',justifyContent:'space-between',marginBottom:3 }}>
                <span style={{ fontSize:13,color:min>0?T.text:T.textFaint,fontWeight:min>0?500:400 }}>{c.name}</span>
                {min>0&&<span style={{ fontSize:12,color:cc.text(dark),fontWeight:600 }}>{durLabel(min)}</span>}
              </div>
              {min>0&&<div style={{ height:3,background:T.statCardBg,borderRadius:99 }}><div style={{ height:'100%',width:`${pct}%`,background:cc.fg,borderRadius:99,opacity:0.7 }} /></div>}
            </div>
          );
        })}
        {addMode?(
          <form onSubmit={handleAdd} style={{ marginTop:8 }}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nom du client" autoFocus style={{ background:T.inputBg,border:`1px solid ${T.inputBorder}`,color:T.inputColor,borderRadius:9,padding:'8px 10px',fontSize:13,fontFamily:'DM Sans,sans-serif',outline:'none',width:'100%',marginBottom:7 }} />
            <div style={{ display:'flex',gap:5 }}>
              <button type="submit" style={{ flex:1,background:'#5b6af0',color:'#fff',border:'none',borderRadius:9,padding:'7px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif' }}>Ajouter</button>
              <button type="button" onClick={()=>setAddMode(false)} style={{ background:T.btnGhostBg,border:`1px solid ${T.btnGhostBorder}`,color:T.btnGhostColor,borderRadius:9,padding:'7px 10px',fontSize:12,cursor:'pointer',fontFamily:'DM Sans,sans-serif' }}>✕</button>
            </div>
          </form>
        ):(
          <button onClick={()=>setAddMode(true)} style={{ background:'none',border:`1px dashed ${T.border}`,borderRadius:9,padding:'7px 10px',color:T.textFaint,fontSize:12,cursor:'pointer',width:'100%',marginTop:4,fontFamily:'DM Sans,sans-serif',transition:'all 0.2s' }}
            onMouseEnter={e=>{e.target.style.borderColor='rgba(91,106,240,0.5)';e.target.style.color='#5b6af0';}}
            onMouseLeave={e=>{e.target.style.borderColor=T.border;e.target.style.color=T.textFaint;}}>
            + Client
          </button>
        )}
      </div>

      {/* Team */}
      <div style={{ borderTop:`1px solid ${T.border}`,paddingTop:14,marginBottom:14 }}>
        <div style={{ fontSize:11,color:T.textFaint,textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:10 }}>Calendriers visibles</div>
        {/* Own calendar toggle */}
        {[user,...teammates].map(m=>{
          const isMe=m.id===user.id;
          const vis=visibleTeam.includes(m.id);
          return (
            <div key={m.id} onClick={()=>onToggleTeam(m.id)} style={{ display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer',padding:'5px 8px',borderRadius:10,transition:'background 0.15s',background:vis?T.statCardBg:'transparent' }}
              onMouseEnter={e=>e.currentTarget.style.background=T.statCardBg}
              onMouseLeave={e=>e.currentTarget.style.background=vis?T.statCardBg:'transparent'}>
              <span style={{ fontSize:20, opacity:vis?1:0.4, transition:'opacity 0.2s' }}>{m.emoji}</span>
              <span style={{ fontSize:13,color:vis?T.text:T.textFaint,fontWeight:vis?500:400,flex:1,transition:'color 0.2s' }}>{m.name}</span>
              <div style={{ width:14,height:14,borderRadius:4,border:`2px solid ${vis?m.color:T.border}`,background:vis?m.color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s' }}>
                {vis&&<span style={{ color:'#fff',fontSize:8 }}>✓</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Notion Sync */}
      <button onClick={onSync} disabled={syncing} style={{ display:'flex',alignItems:'center',gap:10,width:'100%',background:dark?'rgba(22,163,74,0.12)':'rgba(22,163,74,0.08)',border:'1px solid rgba(22,163,74,0.3)',borderRadius:12,padding:'11px 14px',cursor:syncing?'default':'pointer',fontFamily:'DM Sans,sans-serif',transition:'all 0.25s',marginBottom:4,position:'relative',overflow:'hidden' }}
        onMouseEnter={e=>{if(!syncing){e.currentTarget.style.background=dark?'rgba(22,163,74,0.22)':'rgba(22,163,74,0.14)';e.currentTarget.style.borderColor='rgba(22,163,74,0.55)';}}}
        onMouseLeave={e=>{if(!syncing){e.currentTarget.style.background=dark?'rgba(22,163,74,0.12)':'rgba(22,163,74,0.08)';e.currentTarget.style.borderColor='rgba(79,114,245,0.3)';}}}
      >
        <div style={{ width:28,height:28,borderRadius:8,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 8px rgba(0,0,0,0.15)',overflow:'hidden' }}>
          {syncing
            ? <span style={{ display:'inline-block',animation:'spin 1s linear infinite',fontSize:14,color:'#333',lineHeight:1 }}>⟳</span>
            : <img src="assets/logo-notion.png" style={{ width:22,height:22,objectFit:'contain' }} />
          }
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13,fontWeight:600,color:'#16a34a' }}>{syncing?'Synchronisation…':'Sync Notion'}</div>
          {lastSync&&<div style={{ fontSize:10,color:T.textFaint }}>Dernière sync {lastSync}</div>}
        </div>
        {!syncing&&<span style={{ fontSize:12,color:'rgba(79,114,245,0.5)' }}>→</span>}
      </button>


      {/* User */}
      <div style={{ display:'flex',alignItems:'center',gap:8 }}>
        <Avatar member={user} size={30} />
        <span style={{ fontSize:13,color:T.textMuted,flex:1 }}>{user.name}</span>
        {user.id==='u1'&&(
          <button onClick={onAdminOpen} style={{ background:'none',border:'none',color:T.textFaint,cursor:'pointer',fontSize:13,transition:'color 0.15s' }}
            onMouseEnter={e=>e.target.style.color='#4f72f5'} onMouseLeave={e=>e.target.style.color=T.textFaint} title="Gérer l'équipe">⚙</button>
        )}
        <button onClick={onLogout} style={{ background:'none',border:'none',color:T.textFaint,cursor:'pointer',fontSize:13,transition:'color 0.15s' }}
          onMouseEnter={e=>e.target.style.color='#e11d48'}
          onMouseLeave={e=>e.target.style.color=T.textFaint}>↩</button>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────
function App() {
  const [dark,setDark]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_dark')||'false');}catch{return false;}});
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_session3'));}catch{return null;}});
  const [clients,setClients]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_clients3')||'null')||DEFAULT_CLIENTS;}catch{return DEFAULT_CLIENTS;}});
  const [blocks,setBlocks]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_blocks3')||'[]');}catch{return[];}});
  const [teamBlocks]=useState(()=>seedTeamBlocks());
  const [rates,setRates]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_rates3')||'null')||DEFAULT_RATES;}catch{return DEFAULT_RATES;}});
  const [teamMembers,setTeamMembers]=useState(()=>loadTeam());
  const [showAdmin,setShowAdmin]=useState(false);
  const [locations,setLocations]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_locs')||'{}');}catch{return {};}});
  const [visibleTeam,setVisibleTeam]=useState(()=>loadTeam().map(m=>m.id));
  const [weekOffset,setWeekOffset]=useState(0);
  const [showWeekends,setShowWeekends]=useState(()=>{try{return JSON.parse(localStorage.getItem('ooo_weekends3')||'false');}catch{return false;}});
  const [view,setView]=useState('week');
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [toast,setToast]=useState(null);
  const [chrono,setChrono]=useState({running:false,startedAt:null,elapsed:0});
  const chronoRef=useRef(null);

  useEffect(()=>{if(user)localStorage.setItem('ooo_session3',JSON.stringify(user));},[user]);
  useEffect(()=>{localStorage.setItem('ooo_blocks3',JSON.stringify(blocks));},[blocks]);
  useEffect(()=>{localStorage.setItem('ooo_clients3',JSON.stringify(clients));},[clients]);
  useEffect(()=>{localStorage.setItem('ooo_rates3',JSON.stringify(rates));},[rates]);
  useEffect(()=>{localStorage.setItem('ooo_team',JSON.stringify(teamMembers));},[teamMembers]);
  useEffect(()=>{localStorage.setItem('ooo_locs',JSON.stringify(locations));},[locations]);
  useEffect(()=>{localStorage.setItem('ooo_weekends3',JSON.stringify(showWeekends));},[showWeekends]);
  useEffect(()=>{localStorage.setItem('ooo_dark',JSON.stringify(dark));},[dark]);

  // Calendar events (from Calendar child)
  useEffect(()=>{
    const save=e=>{
      const w=e.detail;
      if(w.id) setBlocks(p=>p.map(b=>b.id===w.id?w:b));
      else setBlocks(p=>[...p,{...w,id:'b'+Date.now()}]);
      showT('✓ Entrée enregistrée');
    };
    const del=e=>{ setBlocks(p=>p.filter(b=>b.id!==e.detail)); showT('🗑 Entrée supprimée'); };
    window.addEventListener('ooo-save',save); window.addEventListener('ooo-delete',del);
    return ()=>{ window.removeEventListener('ooo-save',save); window.removeEventListener('ooo-delete',del); };
  },[]);

  // Chrono tick
  useEffect(()=>{
    if(chrono.running){
      chronoRef.current=setInterval(()=>{
        setChrono(p=>({...p,elapsed:Math.floor((Date.now()-p.startedAt)/1000)}));
      },1000);
    } else {
      clearInterval(chronoRef.current);
    }
    return()=>clearInterval(chronoRef.current);
  },[chrono.running]);

  const chronoStart=()=>{
    const now=Date.now();
    setChrono({running:true,startedAt:now,elapsed:0});
  };
  const chronoStop=()=>{
    const startedAt=chrono.startedAt;
    setChrono({running:false,startedAt:null,elapsed:0});
    // Open modal with computed times
    const startDate=new Date(startedAt);
    const endDate=new Date();
    const startMin=startDate.getHours()*60+startDate.getMinutes();
    const endMin=endDate.getHours()*60+endDate.getMinutes();
    const dk=dateKey(startDate);
    window.dispatchEvent(new CustomEvent('ooo-open-modal',{detail:{date:dk,startMin,endMin,clientId:'',taskType:'',note:''}}));
  };

  const fmtChrono=s=>{
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(null),3000);};
  const handleSync=async()=>{
    setSyncing(true);
    try {
      await fetch('https://n8n.srv1422950.hstgr.cloud/webhook/time-clock',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          blocks: blocks.map(b=>({
            ...b,
            userName: TEAM.find(m=>m.id===b.userId)?.name||b.userId,
            clientName: clients.find(c=>c.id===b.clientId)?.name||b.clientId,
            durationMin: b.endMin-b.startMin,
            exportedAt: new Date().toISOString()
          })),
          clients,
          exportedAt: new Date().toISOString()
        })
      });
      showT('✓ Synchronisé avec Notion');
    } catch(err) {
      showT('⚠ Erreur sync: '+err.message);
    }
    setSyncing(false);
    const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    setLastSync(now);
  };

  const T=THEMES[dark?'dark':'light'];

  // Style scoped scrollbar thumb
  useEffect(()=>{
    let s=document.getElementById('ooo-scroll-style');
    if(!s){s=document.createElement('style');s.id='ooo-scroll-style';document.head.appendChild(s);}
    s.textContent=`::-webkit-scrollbar-thumb{background:${T.scrollThumb};}body{background:${T.bg};color:${T.text};}`;
  },[dark]);

  if(!user) return <Login onLogin={u=>setUser(u)} team={teamMembers} />;

  return (
    <div style={{ display:'flex',height:'100%',background:T.bg }}>
      <Sidebar
        user={user} blocks={blocks} teamBlocks={teamBlocks} clients={clients}
        weekStart={getWeekStart(weekOffset)} showWeekends={showWeekends}
        dark={dark} onDarkToggle={()=>setDark(d=>!d)}
        onLogout={()=>{localStorage.removeItem('ooo_session3');setUser(null);}}
        onAddClient={c=>setClients(p=>[...p,c])}
        visibleTeam={visibleTeam} onToggleTeam={id=>setVisibleTeam(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])}
        onSync={handleSync} syncing={syncing} lastSync={lastSync}
        view={view} setView={setView}
        chrono={chrono} onChronoStart={chronoStart} onChronoStop={chronoStop} fmtChrono={fmtChrono}
        onAdminOpen={()=>setShowAdmin(true)}
        team={teamMembers}
      />
      {view==='week'
        ? <Calendar user={user} blocks={blocks} teamBlocks={teamBlocks} clients={clients}
            weekOffset={weekOffset} setWeekOffset={setWeekOffset}
            showWeekends={showWeekends} setShowWeekends={setShowWeekends}
            startHour={0} endHour={24} visibleTeam={visibleTeam} dark={dark} teamProp={teamMembers} />
        : <Dashboard blocks={blocks} teamBlocks={teamBlocks} clients={clients} dark={dark} rates={rates} onRateChange={(id,v)=>setRates(p=>({...p,[id]:v}))} locations={locations} onLocationChange={(id,loc)=>setLocations(p=>({...p,[id]:loc}))} />
      }
      {showAdmin&&user.id==='u1'&&(
        <AdminPanel team={teamMembers} dark={dark}
          onSave={m=>{setTeamMembers(m);setShowAdmin(false);}}
          onClose={()=>setShowAdmin(false)} />
      )}
      {toast&&<div style={{ position:'fixed',bottom:24,right:24,background:T.toastBg,border:`1px solid ${T.toastBorder}`,color:T.toastColor,padding:'12px 20px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:200,boxShadow:'0 4px 16px rgba(0,0,0,0.1)',animation:'slideIn 0.3s ease' }}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
