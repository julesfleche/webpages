<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOO · Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#080808; --black-2:#111111; --black-3:#1a1a1a;
    --white:#ffffff; --off-white:#f5f4f0;
    --muted:#888884; --muted-2:#555552;
    --accent:#5b6af0;
    --accent-light:rgba(91,106,240,0.15);
    --border-dark:rgba(255,255,255,0.08);
    --border-light:rgba(0,0,0,0.08);
    --font-display:'Poppins',sans-serif;
    --font-body:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--font-body);background:var(--black);color:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;}
  .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;font-family:var(--font-body);}
  .loading h1{font-family:var(--font-display);font-weight:600;font-size:48px;letter-spacing:-2px;background:linear-gradient(135deg,#6b7fff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding:0.15em 0.12em;}
  .loading p{color:var(--muted);font-size:16px;max-width:480px;text-align:center;}
  .loading a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(91,106,240,0.3);transition:border-color .2s;}
  .loading a:hover{border-color:var(--accent);}
</style>
</head>
<body>
<div class="loading">
  <h1>Design System OOO</h1>
  <p>Le fichier complet (101k de DA) est en cours de déploiement via un channel alternatif. Consultez <a href="https://github.com/julesfleche/webpages">le repo GitHub</a> pour la version finale.</p>
</div>
</body>
</html>
